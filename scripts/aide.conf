#!/bin/bash
# aide.conf - Helper script to write the AIDE fragment for DecoyWatch
# Called by setup_aide when needed for config refresh
set -euo pipefail

source /usr/share/yunohost/helpers

app=$YNH_APP_INSTANCE_NAME
watch_dirs=$(ynh_app_setting_get --app="$app" --key=watch_dirs)

AIDE_CONF_DIR="/etc/aide/aide.conf.d"
AIDE_CONF="${AIDE_CONF_DIR}/decoy_watch.conf"
mkdir -p "$AIDE_CONF_DIR"

cat > "$AIDE_CONF" << EOF
# DecoyWatch AIDE Configuration Fragment
# Auto-generated - do not edit manually

DECOYWATCH = p+i+n+u+g+s+m+c+acl+xattrs+sha512
EOF

IFS=',' read -ra DIRS <<< "$watch_dirs"
for dir in "${DIRS[@]}"; do
    dir="$(echo "$dir" | xargs)"
    if [[ -d "$dir" ]]; then
        echo "${dir} DECOYWATCH" >> "$AIDE_CONF"
    fi
done

chmod 640 "$AIDE_CONF"
if getent group _aide >/dev/null 2>&1; then
    chown root:_aide "$AIDE_CONF"
else
    chown root:root "$AIDE_CONF"
fi

# Re-initialize database if it exists already
if [[ -f /var/lib/aide/aide.db.gz ]]; then
    aideinit --yes 2>/dev/null || true
    [[ -f /var/lib/aide/aide.db.new.gz ]] && cp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz
fi

ynh_script_progression --message="AIDE config refreshed" --last
